<!DOCTYPE html>
<html>
    <head>
        <title>Advanced Functions</title>
        
    </head>
    <body>
        <script>
            function greet(name, callback){
                console.log("Hello" +name);
                callback();

            }

            function sayGoodbye() {
                console.log("Goodbbye! ");
            }

            greet("Rojan", sayGoodbye)

            function run(param) {
                param();

            }

            run(function() {
                console.log("helo4");
            });
                
        </script>
    </body>
</html>
